
<style>
  .tab-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn { padding: 8px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); cursor: pointer; font: 13px var(--font-sans); transition: all 0.15s; }
  .tab-btn:hover { background: var(--color-background-secondary); }
  .tab-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-secondary); }
  .panel { display: flex; gap: 20px; align-items: flex-start; }
  .chart-wrap { flex: 1; min-width: 0; }
  .info-wrap { flex: 1; min-width: 0; font: 14px var(--font-sans); color: var(--color-text-primary); line-height: 1.6; }
  .info-wrap h4 { font-size: 15px; font-weight: 500; margin: 0 0 8px; }
  .info-wrap p { margin: 0 0 10px; color: var(--color-text-secondary); font-size: 13px; }
  .tag { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: var(--border-radius-md); margin-bottom: 10px; }
  .tag-bad { background: #FCEBEB; color: #791F1F; }
  .tag-warn { background: #FAEEDA; color: #633806; }
  .tag-good { background: #EAF3DE; color: #27500A; }
  .tag-info { background: #E6F1FB; color: #0C447C; }
  @media (prefers-color-scheme: dark) {
    .tag-bad { background: #501313; color: #F7C1C1; }
    .tag-warn { background: #412402; color: #FAC775; }
    .tag-good { background: #173404; color: #C0DD97; }
    .tag-info { background: #042C53; color: #B5D4F4; }
  }
  canvas { width: 100%; max-width: 340px; height: 220px; }
</style>
<h2 class="sr-only">Interactive diagnostic of six common loss curve shapes, each with cause and recommended fix.</h2>
<div class="tab-row" id="tabs"></div>
<div class="panel">
  <div class="chart-wrap"><canvas id="chart" width="340" height="220"></canvas></div>
  <div class="info-wrap" id="info"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const cases = [
  {
    id: 'flat',
    name: 'Loss stays flat',
    tag: 'tag-bad', tagText: 'Not learning',
    cause: 'Learning rate too small, or weight_scale too small so gradients vanish.',
    fix: 'Increase learning_rate by 3-10x. If still flat, increase weight_scale.',
    gen: (n) => Array.from({length: n}, (_, i) => 2.30 - 0.002 * i + (Math.random() - 0.5) * 0.01)
  },
  {
    id: 'slow',
    name: 'Loss decreases slowly',
    tag: 'tag-warn', tagText: 'Too conservative',
    cause: 'Learning rate is safe but suboptimal. Network is learning, just inefficiently.',
    fix: 'Increase learning_rate by 2-3x. Monitor whether it becomes unstable.',
    gen: (n) => Array.from({length: n}, (_, i) => 2.30 * Math.exp(-i / 180) + 0.5 + (Math.random() - 0.5) * 0.02)
  },
  {
    id: 'good',
    name: 'Smooth decrease then plateau',
    tag: 'tag-good', tagText: 'Healthy curve',
    cause: 'Learning rate and initialization are both in a good range.',
    fix: 'Nothing to fix here. Add lr_decay if you want to squeeze out the last bit.',
    gen: (n) => Array.from({length: n}, (_, i) => 2.30 * Math.exp(-i / 40) + 0.1 + (Math.random() - 0.5) * 0.03)
  },
  {
    id: 'oscillate',
    name: 'Loss oscillates heavily',
    tag: 'tag-warn', tagText: 'Unstable',
    cause: 'Learning rate too large. Each step overshoots the minimum.',
    fix: 'Reduce learning_rate by 3-10x. Or add momentum / switch to Adam.',
    gen: (n) => Array.from({length: n}, (_, i) => 1.2 + 0.7 * Math.exp(-i / 100) + Math.sin(i / 3) * 0.5 * Math.exp(-i / 150) + (Math.random() - 0.5) * 0.3)
  },
  {
    id: 'explode',
    name: 'Loss explodes to NaN',
    tag: 'tag-bad', tagText: 'Divergent',
    cause: 'Learning rate severely too large, or weight_scale too large causing activations to blow up.',
    fix: 'Reduce learning_rate by 10-100x, and reduce weight_scale.',
    gen: (n) => Array.from({length: n}, (_, i) => i < 30 ? 2.30 + i * 0.05 : (i < 50 ? 3.8 + Math.pow(i - 30, 1.8) * 0.3 : NaN))
  },
  {
    id: 'overfit',
    name: 'Train loss low, val loss rises',
    tag: 'tag-info', tagText: 'Overfitting',
    cause: 'Model memorizes training data instead of learning general patterns.',
    fix: 'Increase reg, add dropout, reduce hidden_dim, or get more training data.',
    gen: null
  }
];

const STEPS = 300;
const xs = Array.from({length: STEPS}, (_, i) => i);

let chart;
const ctx = document.getElementById('chart').getContext('2d');
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const axisCol = isDark ? '#9c9a92' : '#73726c';
const gridCol = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';

function render(caseIdx) {
  const c = cases[caseIdx];
  const info = document.getElementById('info');
  info.innerHTML = `
    <span class="tag ${c.tag}">${c.tagText}</span>
    <h4>${c.name}</h4>
    <p><strong style="color:var(--color-text-primary);font-weight:500">Likely cause:</strong> ${c.cause}</p>
    <p><strong style="color:var(--color-text-primary);font-weight:500">How to fix:</strong> ${c.fix}</p>
  `;

  let datasets;
  if (c.id === 'overfit') {
    const trainLoss = xs.map(i => 2.30 * Math.exp(-i / 30) + 0.05 + (Math.random() - 0.5) * 0.02);
    const valLoss = xs.map(i => {
      if (i < 80) return 2.30 * Math.exp(-i / 35) + 0.3 + (Math.random() - 0.5) * 0.03;
      return 0.6 + (i - 80) * 0.004 + (Math.random() - 0.5) * 0.04;
    });
    datasets = [
      { label: 'Train loss', data: trainLoss, borderColor: '#378ADD', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5 },
      { label: 'Val loss', data: valLoss, borderColor: '#E24B4A', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5 }
    ];
  } else {
    datasets = [{ label: 'Loss', data: c.gen(STEPS), borderColor: '#378ADD', backgroundColor: 'transparent', tension: 0.3, pointRadius: 0, borderWidth: 1.5 }];
  }

  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: xs, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: c.id === 'overfit', labels: { color: axisCol, font: { size: 12 } } } },
      scales: {
        x: { title: { display: true, text: 'Iteration', color: axisCol, font: { size: 12 } }, ticks: { color: axisCol, font: { size: 11 } }, grid: { color: gridCol } },
        y: { title: { display: true, text: 'Loss', color: axisCol, font: { size: 12 } }, ticks: { color: axisCol, font: { size: 11 } }, grid: { color: gridCol }, min: 0, max: c.id === 'explode' ? 30 : 3 }
      }
    }
  });
}

const tabRow = document.getElementById('tabs');
cases.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.textContent = c.name;
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(i);
  };
  tabRow.appendChild(btn);
});
render(0);
</script>
